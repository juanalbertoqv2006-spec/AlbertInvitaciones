<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Party! | Demo Interactiva</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background: radial-gradient(circle, #1a103c 0%, #0b061f 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        /* Estética estilo menú de Brawl Stars */
        .brawl-card {
            background: #2b155c;
            max-width: 440px;
            width: 100%;
            border: 5px solid #fede01; /* Amarillo Brawl */
            border-radius: 15px;
            box-shadow: 0 0 30px #00f0ff; /* Brillo cian tipo Starr Drop */
            text-align: center;
            padding: 30px 20px;
            position: relative;
        }

        /* Imagen Principal Real de Internet */
        .banner-img {
            width: 100%;
            border-radius: 8px;
            border: 3px solid #00f0ff;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.2rem;
            color: #fede01;
            letter-spacing: 1px;
            text-shadow: 3px 3px 0px #e11a22; /* Sombra roja Brawl */
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .stand-title {
            font-size: 1.1rem;
            color: #00f0ff;
            font-style: italic;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        /* Reloj Regresivo */
        .countdown {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed #fede01;
            padding: 15px 5px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .time-box span {
            display: block;
        }
        .num {
            font-size: 1.8rem;
            color: #00f0ff;
            text-shadow: 1px 1px 5px #000;
        }
        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #fede01;
        }
        /* Sección Google Maps */
        .map-container {
            margin: 25px 0;
            border: 3px solid #fede01;
            border-radius: 8px;
            overflow: hidden;
            height: 200px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Reproductor de Música */
        .music-box {
            background: #190a3a;
            padding: 12px;
            border-radius: 30px;
            margin: 20px 0;
            border: 1px solid #00f0ff;
        }
        /* Botón de Acción Estilo JUGAR de Brawl Stars */
        .btn-jojo {
            display: block;
            background: linear-gradient(180deg, #ff9000 0%, #ff5400 100%);
            color: white;
            padding: 15px;
            text-decoration: none;
            font-size: 1.4rem;
            border-radius: 50px;
            box-shadow: 0 5px 0 #b33a00;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px #000;
            transition: 0.1s;
        }
        .btn-jojo:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #b33a00;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #8a7cb3;
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="brawl-card">

        <!-- Integración de Imagen Principal Real de Brawl Stars -->
        <img src="https://files.catbox.moe/b8lz0p.jpg" alt="Brawl Stars Arena" class="banner-img">
        
        <!-- Imagen decorativa en esquina superior izquierda (Pin de Corona/Trofeo) -->
        <img src="https://files.catbox.moe/dnbdp4.jpg" 
             alt="Brawler Left" 
             style="position:absolute; top:10px; left:10px; width:80px; border:2px solid #ff00ff; border-radius:10px;">
             
        <!-- Imagen decorativa en esquina inferior derecha (Brawler Icon) -->
        <img src="https://files.catbox.moe/oj14ys.jpg" 
             alt="Brawler Right" 
             style="position:absolute; bottom:10px; right:10px; width:80px; border:2px solid #00ffff; border-radius:10px;">

        <h1>¡La Brawl Party de Mortis!</h1>
        <p class="stand-title">EVENTO ESPECIAL: ACTIVO 🟢</p>
        <p>¿Listo para entrar a la composición? Acompáñame a subir de copas y celebrar mi cumpleaños número 10 en la arena.</p>

        <!-- Cronómetro Dinámico -->
        <div class="countdown">
            <div class="time-box">
                <span class="num" id="j-days">00</span>
                <span class="label">Días</span>
            </div>
            <div class="time-box">
                <span class="num" id="j-hours">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="time-box">
                <span class="num" id="j-min">00</span>
                <span class="label">Min</span>
            </div>
            <div class="time-box">
                <span class="num" id="j-seg">00</span>
                <span class="label">Seg</span>
            </div>
        </div>

        <p style="color: #fede01; margin-bottom: 10px;">📍 MAPA DEL ENCUENTRO:</p>
        
        <!-- Integración Real de Google Maps mediante un Iframe Embebido -->
<div class="map-container">
  <iframe 
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509374!2d144.9630579153169!3d-37.81627977975195!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad642af0f11fd81%3A0xf577d1f9f1f1f1f1!2sFederation%20Square!5e0!3m2!1ses-419!2smx!4v1719430000000!5m2!1ses-419!2smx" 
    width="600" 
    height="450" 
    style="border:0;" 
    allowfullscreen="" 
    loading="lazy" 
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>

        <!-- Reproductor de Audio Legal con el Menú Theme de Brawl Stars -->
        <div class="music-box">
            <p style="font-size: 0.8rem; color: #00f0ff; margin-bottom: 5px;">🎵 SOUNDTRACK DE LA PARTIDA:</p>
            <audio id="jojo-audio" controls autoplay muted loop style="width: 100%; height: 30px;">
                <source src="https://files.catbox.moe/e0lann.mp3" type="audio/mpeg">
                Tu navegador no soporta audio HTML5.
            </audio>

            <script>
              window.addEventListener('load', () => {
                const audio = document.getElementById('jojo-audio');
                audio.muted = false; // quita el mute al cargar
                audio.play().catch(err => console.log("Autoplay bloqueado:", err));
              });
            </script>
        </div>

        <!-- Botón de Acción Estilo JUGAR directo a tu WhatsApp -->
        <a href="https://wa.me/528992352516" 
           target="_blank" 
           class="btn-jojo">
           ¡JUGAR! (CONFIRMAR)
        </a>

        <a href="../../index.html" class="back-link">← Volver al catálogo</a>
    </div>

    <script>
        // Fecha meta simulada (22 de Agosto de 2026)
        const countDate = new Date(2026, 7, 22, 16, 0, 0).getTime();

        function jojoClock() {
            const now = new Date().getTime();
            const gap = countDate - now;

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById('j-days').innerText = String(d >= 0 ? d : 0).padStart(2, '0');
            document.getElementById('j-hours').innerText = String(h >= 0 ? h : 0).padStart(2, '0');
            document.getElementById('j-min').innerText = String(m >= 0 ? m : 0).padStart(2, '0');
            document.getElementById('j-seg').innerText = String(s >= 0 ? s : 0).padStart(2, '0');
        }
        jojoClock();
        setInterval(jojoClock, 1000);
    </script>
</body>
</html>
